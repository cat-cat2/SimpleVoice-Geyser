<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="build-id" content="@@GIT_COMMIT@@">
    <title>SimpleVoice-Geyser</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/ptt.css">
    <link rel="icon" href="images/svg-temp.png" type="image/x-icon">
    <link rel="stylesheet" href="css/presets.css">
    <!--<link rel="manifest" href="/manifest.json">-->
    <script src="js/utils/lang.js"></script>
</head>

<body>
    <h1><span class="lang" id="joinLabel"></span></h1>
    <div id="form-container">
        <form id="joinForm">
            <label for="username"><span class="lang" id="usernameInput"></span>:</label>
            <input type="text" id="username" name="username" required autocomplete="username">

            <label for="password"><span class="lang" id="passwordInput"></span>:</label>
            <input type="password" id="password" name="password" required autocomplete="svg-password">

            <label for="mic"><span class="lang" id="micSelect"></span>:</label>
            <select id="mic" name="mic">
                <option disabled selected><span class="lang" id="micLoad"></span></option>
            </select>

            <label for="speaker"><span class="lang" id="speakSelect"></span>:</label>
            <select id="speaker" name="speaker">
                <option disabled selected><span class="lang" id="speakLoad"></span></option>
            </select>

            <button type="submit" id="joinbtn"><span class="lang" id="joinBtnText"></span></button>
        </form>
    </div>
    <!-- Added translated spanish to noscript text and moved its css into styles.css-->
    <noscript>
        <div class="noscript-container">
            <h2>Error:</h2>
            <p>JavaScript is required to use this application.</p>
            <br>
            <h2>Error:</h2>
            <p>Se requiere JavaScript para utilizar esta aplicación.</p>
        </div>
    </noscript>
    <div id="main-vc-container">
        <br>
        <div id="status"><span class="lang" id="joinWait"></span></div>
        <div id="log"></div>
        <br>
        <div id="inputArea">
            <label for="msgInput"><span class="lang" id="msgText"></span></label>
            <input type="text" id="msgInput" placeholder="Type a message..." />
            <button id="messageButton"><span class="lang" id="sendBtnText"></span></button>
        </div>
    </div>
    <br>
    <div id="controls">
        <div id="controls-main">
            <div class="controls-card" id="micCard">
                <div class="control-group">
                    <span class="control-label"><span class="lang" id="micSLabel"></span></span>
                    <div id="micControls">
                        <button id="muteBtn" class="unmuted"><span class="lang" id="muteBtnText"></span></button>
                        <span id="micIndicator" title="Mic activity"></span>
                    </div>
                </div>
            </div>

            <div class="controls-card">
                <div class="control-group">
                    <span class="control-label"><span class="lang" id="transmitModeLabel"></span></span>
                    <select id="transmitModeSelect" aria-label="Transmit mode">
                        <option value="voice"><span class="lang" id="voiceActivityText"></span></option>
                        <option value="ptt"><span class="lang" id="pushToTalkText"></span></option>
                    </select>
                </div>
            </div>

            <div class="controls-card controls-card-ptt dev-hidden" id="pttCard">
                <div class="control-group" id="pttBindingControls">
                    <span class="control-label"><span class="lang" id="pttBindingLabel"></span></span>
                    <div class="ptt-action-row">
                        <button id="bindPttBtn" type="button"><span class="lang" id="bindPttBtnText"></span></button>
                        <button id="clearPttBtn" type="button"><span class="lang" id="clearPttBtnText"></span></button>
                    </div>
                    <small id="control-label"><span class="lang" id="pttBindingDescription"></span></small>
                    <label class="ptt-background-toggle">
                        <input type="checkbox" id="allowBackgroundPtt">
                        <span><span class="lang" id="allowBackgroundPttText"></span></span>
                    </label>
                </div>

                <div class="control-group" id="pttControls">
                    <span class="control-label"><span class="lang" id="pttLabel"></span></span>
                    <div>
                        <button id="pushToTalkBtn" class="pttButton" type="button"><span class="lang"
                                id="pushToTalkBtnText"></span></button>
                        <button id="fullscreenPttBtn" type="button"><span class="lang"
                                id="fullscreenPttBtnText"></span></button>
                    </div>
                </div>
            </div>

        </div>
        <div class="controls-divider"></div>
        <div id="controls-dev">
            <button id="devToggle" class="dev-toggle">
                <span class="lang" id="devToolsLabel"></span> ▼
            </button>
            <div id="devContent">
                <div class="control-group">
                    <span class="control-label"><span class="lang" id="debugAudioLabel"></span></span>
                    <button id="testSound" type="button"><span class="lang" id="testSoundBtnText"></span></button>
                </div>
            </div>
        </div>
    </div>
    <div id="color-editor">
        <h2><span class="lang" id="colorEditorLabel"></span></h2>
        <div id="preset-field"></div>
    </div>
    <!--Added more links and tweaked github image-->
    <div style="margin-left: auto; margin-right: auto;">
        <div style="display: flex; flex-direction: column; gap: 12px;">

            <a href="https://github.com/TheodoreMeyer/SimpleVoice-Geyser" target="_blank"
                style="display: flex; align-items: center; gap: 10px; text-decoration: none; line-height: 1;">
                <span
                    style="width: 25px !important; height: 25px !important; max-width: 25px !important; min-width: 25px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-github" viewBox="0 0 16 16"
                        style="width: 100% !important; height: 100% !important; max-width: 100% !important; display: block;">
                        <path
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8" />
                    </svg>
                </span>
                <span>Theodore Meyer</span>
            </a>

            <a href="https://modrinth.com/plugin/simplevoice-geyser" target="_blank"
                style="display: flex; align-items: center; gap: 10px; text-decoration: none; line-height: 1;">
                <span
                    style="width: 25px !important; height: 25px !important; max-width: 25px !important; min-width: 25px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;">
                    <img src="images/modrinth.ico" alt="modrinth logo"
                        style="width: 100% !important; height: 100% !important; max-width: 100% !important; object-fit: contain; display: block;">
                </span>
                <span>SimpleVoice-Geyser</span>
            </a>

            <a href="https://theodoremeyer.github.io/projects/simplevoicegeyser/" target="_blank"
                style="display: flex; align-items: center; gap: 10px; text-decoration: none; line-height: 1;">
                <span
                    style="width: 25px !important; height: 25px !important; max-width: 25px !important; min-width: 25px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-file-earmark-fill"
                        viewBox="0 0 16 16"
                        style="width: 100% !important; height: 100% !important; max-width: 100% !important; display: block;">
                        <path
                            d="M4 0h5.293A1 1 0 0 1 10 .293L13.707 4a1 1 0 0 1 .293.707V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2m5.5 1.5v2a1 1 0 0 0 1 1h2z" />
                    </svg>
                </span>
                <span>Docs</span>
            </a>

        </div>
    </div>
    <!--bug report button-->
    <button class="report-button" title="Click to report a bug"
        onclick="window.open('https://github.com/TheodoreMeyer/SimpleVoice-Geyser/issues', '_blank');">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-bug"
            viewBox="0 0 16 16">
            <path
                d="M4.355.522a.5.5 0 0 1 .623.333l.291.956A5 5 0 0 1 8 1c1.007 0 1.946.298 2.731.811l.29-.956a.5.5 0 1 1 .957.29l-.41 1.352A5 5 0 0 1 13 6h.5a.5.5 0 0 0 .5-.5V5a.5.5 0 0 1 1 0v.5A1.5 1.5 0 0 1 13.5 7H13v1h1.5a.5.5 0 0 1 0 1H13v1h.5a1.5 1.5 0 0 1 1.5 1.5v.5a.5.5 0 1 1-1 0v-.5a.5.5 0 0 0-.5-.5H13a5 5 0 0 1-10 0h-.5a.5.5 0 0 0-.5.5v.5a.5.5 0 1 1-1 0v-.5A1.5 1.5 0 0 1 2.5 10H3V9H1.5a.5.5 0 0 1 0-1H3V7h-.5A1.5 1.5 0 0 1 1 5.5V5a.5.5 0 0 1 1 0v.5a.5.5 0 0 0 .5.5H3c0-1.364.547-2.601 1.432-3.503l-.41-1.352a.5.5 0 0 1 .333-.623M4 7v4a4 4 0 0 0 3.5 3.97V7zm4.5 0v7.97A4 4 0 0 0 12 11V7zM12 6a4 4 0 0 0-1.334-2.982A3.98 3.98 0 0 0 8 2a3.98 3.98 0 0 0-2.667 1.018A4 4 0 0 0 4 6z" />
        </svg>
    </button>
    <!--fixed when hovering over hold to talk button covering up exit full screen button-->
    <div id="pttFullscreenOverlay" aria-hidden="true">
        <button id="pushToTalkFullscreenBtn" class="pttButton" type="button"><span class="lang"
                id="pushToTalkFullscreenBtnText"></span></button>
        <br>
        <button id="exitFullscreenPttBtn" type="button"><span class="lang"
                id="exitFullscreenPttBtnText"></span></button>
    </div>
    <script>
        const availablePresets = ['default', 'dark', 'light', 'green', 'blue', 'purple', 'red', 'yellow', 'cyan', 'monochrome', 'monokai', 'orange', 'mint', 'rose'];
        const savedPreset = localStorage.getItem('preset');
        availablePresets.forEach(preset => {
            document.getElementById('preset-field').insertAdjacentHTML('beforeend', `<button class="preset-btn" data-preset="${preset}">${preset.charAt(0).toUpperCase() + preset.slice(1)}</button>`);
        });
        applyPreset(availablePresets.includes(savedPreset) ? savedPreset : 'default');

        document.querySelectorAll('#color-editor button[data-preset]').forEach(button => {
            button.addEventListener('click', () => {
                const preset = button.getAttribute('data-preset');
                applyPreset(preset);
            });
        });

        function applyPreset(preset) {
            for (const name of availablePresets) {
                document.body.classList.remove(`preset-${name}`);
            }
            document.body.classList.add(`preset-${preset}`);
            localStorage.setItem('preset', preset);
        }
    </script>
    <script type="module">
        window.BUILD_ID = "@@GIT_COMMIT@@";

        /** @import {SvgClientOptions} from './js/types.js' */
        import { SvgClient } from './js/client.js';

        const client = new SvgClient(/** @type {SvgClientOptions} */{
            ui: {
                form: {
                    formEl: document.getElementById("joinForm"),
                    joinButton: document.getElementById("joinbtn"),
                    statusEl: document.getElementById("status"),
                    usernameInput: document.getElementById("username"),
                    passwordInput: document.getElementById("password")
                },
                audio: {
                    speakerSelect: document.getElementById("speaker"),
                    micSelect: document.getElementById("mic"),
                    muteBtn: document.getElementById("muteBtn"),
                    micIndicator: document.getElementById("micIndicator")
                },

                ptt: {
                    micCard: document.getElementById("micCard"),
                    transmitModeSelect: document.getElementById("transmitModeSelect"),

                    pttCard: document.getElementById("pttCard"),
                    pttBindingControls: document.getElementById("pttBindingControls"),

                    bindPttBtn: document.getElementById("bindPttBtn"),
                    clearPttBtn: document.getElementById("clearPttBtn"),

                    pttBindingLabel: document.getElementById("control-label"),

                    pttControls: document.getElementById("pttControls"),

                    pushToTalkBtn: document.getElementById("pushToTalkBtn"),
                    fullscreenPttBtn: document.getElementById("fullscreenPttBtn"),

                    pttFullscreenOverlay: document.getElementById("pttFullscreenOverlay"),

                    pushToTalkFullscreenBtn: document.getElementById("pushToTalkFullscreenBtn"),
                    exitFullscreenPttBtn: document.getElementById("exitFullscreenPttBtn"),

                    allowBackgroundPttCheckbox:
                        document.getElementById("allowBackgroundPtt")
                },

                dev: {
                    devToggle: document.getElementById("devToggle"),
                    devContent: document.getElementById("devContent")
                }
            },
            chat: {
                logEl: document.getElementById("log"),
                inputEl: document.getElementById("msgInput"),
                sendBtn: document.getElementById("messageButton")
            },
        });

        await client.start();
    </script>

</body>

</html>
